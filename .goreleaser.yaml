version: 2

before:
  hooks:
    - go mod tidy

builds:
  # Linux AMD64
  - id: linux-amd64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-linux-gnu
      - CXX=zig c++ -target x86_64-linux-gnu
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/sirrobot01/decypharr/pkg/version.Version={{.Version}}
      - -X github.com/sirrobot01/decypharr/pkg/version.Channel={{.Env.RELEASE_CHANNEL}}

  # Linux ARM64
  - id: linux-arm64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target aarch64-linux-gnu
      - CXX=zig c++ -target aarch64-linux-gnu
    goos:
      - linux
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sirrobot01/decypharr/pkg/version.Version={{.Version}}
      - -X github.com/sirrobot01/decypharr/pkg/version.Channel={{.Env.RELEASE_CHANNEL}}

  # Linux ARM (32-bit)
  - id: linux-arm
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target arm-linux-gnueabihf
      - CXX=zig c++ -target arm-linux-gnueabihf
      - GOARM=7
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - "7"
    ldflags:
      - -s -w
      - -X github.com/sirrobot01/decypharr/pkg/version.Version={{.Version}}
      - -X github.com/sirrobot01/decypharr/pkg/version.Channel={{.Env.RELEASE_CHANNEL}}

  # macOS AMD64
  - id: darwin-amd64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-macos
      - CXX=zig c++ -target x86_64-macos
    goos:
      - darwin
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/sirrobot01/decypharr/pkg/version.Version={{.Version}}
      - -X github.com/sirrobot01/decypharr/pkg/version.Channel={{.Env.RELEASE_CHANNEL}}

  # macOS ARM64 (Apple Silicon)
  - id: darwin-arm64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target aarch64-macos
      - CXX=zig c++ -target aarch64-macos
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X github.com/sirrobot01/decypharr/pkg/version.Version={{.Version}}
      - -X github.com/sirrobot01/decypharr/pkg/version.Channel={{.Env.RELEASE_CHANNEL}}

  # Windows AMD64
  - id: windows-amd64
    env:
      - CGO_ENABLED=1
      - CC=zig cc -target x86_64-windows-gnu
      - CXX=zig c++ -target x86_64-windows-gnu
    goos:
      - windows
    goarch:
      - amd64
    ldflags:
      - -s -w
      - -X github.com/sirrobot01/decypharr/pkg/version.Version={{.Version}}
      - -X github.com/sirrobot01/decypharr/pkg/version.Channel={{.Env.RELEASE_CHANNEL}}

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      decypharr_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"


release:
  github:
    owner: sirrobot01
    name: decypharr
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## DBNest {{ .Tag }}
    Welcome to this new release of DBNest!

  footer: |
    ## Docker Images

    Docker images are available on

    - [GitHub Container Registry](https://github.com/sirrobot01/decypharr/pkgs/container/decypharr)
    - [Docker Hub](https://hub.docker.com/r/cy01/blackhole)

    ```bash
    docker pull ghcr.io/sirrobot01/decypharr:{{ .Tag }}
    docker pull cy01/blackhole:{{ .Tag }}
    ```

dockers:
  # GitHub Container Registry - amd64
  - image_templates:
      - "ghcr.io/sirrobot01/decypharr:{{ .Tag }}-amd64"
      - "ghcr.io/sirrobot01/decypharr:latest-amd64"
    use: buildx
    dockerfile: docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/amd64"
    goarch: amd64

  # GitHub Container Registry - arm64
  - image_templates:
      - "ghcr.io/sirrobot01/decypharr:{{ .Tag }}-arm64"
      - "ghcr.io/sirrobot01/decypharr:latest-arm64"
    use: buildx
    dockerfile: docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/arm64"
    goarch: arm64

  # Docker Hub - amd64
  - image_templates:
      - "docker.io/cy01/blackhole:{{ .Tag }}-amd64"
      - "docker.io/cy01/blackhole:latest-amd64"
    use: buildx
    dockerfile: docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/amd64"
    goarch: amd64

  # Docker Hub - arm64
  - image_templates:
      - "docker.io/cy01/blackhole:{{ .Tag }}-arm64"
      - "docker.io/cy01/blackhole:latest-arm64"
    use: buildx
    dockerfile: docker/Dockerfile.goreleaser
    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  # GHCR manifests
  - name_template: "ghcr.io/sirrobot01/decypharr:{{ .Tag }}"
    image_templates:
      - "ghcr.io/sirrobot01/decypharr:{{ .Tag }}-amd64"
      - "ghcr.io/sirrobot01/decypharr:{{ .Tag }}-arm64"

  - name_template: "ghcr.io/sirrobot01/decypharr:latest"
    image_templates:
      - "ghcr.io/sirrobot01/decypharr:latest-amd64"
      - "ghcr.io/sirrobot01/decypharr:latest-arm64"

  # Docker Hub manifests
  - name_template: "docker.io/cy01/blackhole:{{ .Tag }}"
    image_templates:
      - "docker.io/cy01/blackhole:{{ .Tag }}-amd64"
      - "docker.io/cy01/blackhole:{{ .Tag }}-arm64"

  - name_template: "docker.io/cy01/blackhole:latest"
    image_templates:
      - "docker.io/cy01/blackhole:latest-amd64"
      - "docker.io/cy01/blackhole:latest-arm64"